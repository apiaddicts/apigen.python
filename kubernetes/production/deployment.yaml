apiVersion: apps/v1
kind: Deployment
metadata:
  name: apigen-python-production
  labels:
    app: apigen-python-production
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: apigen-python-production
  template:
    metadata:
      labels:
        app: apigen-python-production
        version: $CI_COMMIT_TAG
    spec:
      imagePullSecrets:
        - name: registry-gitlab
      containers:
        - name: apigen-python-production
          image: IMAGE_GITLAB
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            limits:
              cpu: '500m'
              memory: '500Mi'
            requests:
              cpu: '100m'
              memory: '250Mi'
---
apiVersion: v1
kind: Service
metadata:
  name: apigen-python-production
  labels:
    app: apigen-python-production
spec:
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8000
  selector:
    app: apigen-python-production
